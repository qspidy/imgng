# Add this line to the nginx `http` block first:
#
#   limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

location /images/ {
    alias /var/www/images/;

    valid_referers none blocked *.yourdomain.com;
    if ($invalid_referer) {
        return 403;
    }

    expires 30d;
    add_header Cache-Control "public";
}

location /upload {
    limit_except POST { deny all; }

    limit_req zone=upload_limit burst=5 nodelay;

    auth_basic "Upload";
    auth_basic_user_file /etc/nginx/.htpasswd;

    client_max_body_size 20M;
    client_body_in_file_only on;
    client_body_temp_path /tmp/nginx_upload;

    content_by_lua_block {
        ngx.req.read_body()

        local file = ngx.req.get_body_file()
        if not file then
            ngx.status = 400
            ngx.say("no body file")
            return
        end

        local allowed_extensions = {
            jpg = true,
            jpeg = true,
            png = true,
            webp = true,
            gif = true,
            avif = true,
        }

        local ext = ngx.var.http_x_file_extension or ""
        if ext == "" then
            local handle = io.popen("/usr/bin/file -b --mime-type " .. file .. " 2>/dev/null")
            local mime_type = handle:read("*a")
            handle:close()

            local mime_to_ext = {
                ["image/jpeg"] = "jpg",
                ["image/png"] = "png",
                ["image/webp"] = "webp",
                ["image/gif"] = "gif",
                ["image/avif"] = "avif",
            }

            ext = mime_to_ext[mime_type:gsub("%s+", "")]
            if not ext then
                ngx.status = 415
                ngx.say("unsupported file type")
                return
            end
        else
            ext = ext:gsub("^%.", ""):lower()
            if not allowed_extensions[ext] then
                ngx.status = 415
                ngx.say("unsupported file type")
                return
            end
        end

        local id = ngx.var.request_id
        local target = "/var/www/images/" .. id .. "." .. ext

        local ok, err = os.rename(file, target)
        if not ok then
            ngx.status = 500
            ngx.say("rename failed: ", err)
            return
        end

        os.execute("/bin/chmod 600 " .. target .. " 2>/dev/null")
        os.execute("/usr/bin/mogrify -quality 85 -strip " .. target .. " 2>/dev/null")

        local url = ngx.var.scheme .. "://" .. ngx.var.host .. "/images/" .. id .. "." .. ext
        ngx.header["X-File"] = id .. "." .. ext
        ngx.say(url)
    }
}
